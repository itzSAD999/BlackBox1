
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBox | Precision Tech Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #000000;
            --card-bg: #080808; 
            --accent-gold: #D4AF37; /* More metallic gold */
            --accent-gold-light: #F4E4C1; /* Lighter metallic gold */
            --accent-gold-dark: #B8941F; /* Darker metallic gold */
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        .font-heading {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: 0.05em;
        }
        
        .font-serif-luxury {
            font-family: 'Playfair Display', serif;
        }

        /* Enhanced text colors for better contrast */
        .text-off-white {
            color: #F8F8F8;
        }

        /* Improved font styling */
        .font-heading {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: 0.02em;
            font-weight: 700;
            line-height: 1.2;
        }
        
        .font-heading-light {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: 0.01em;
            font-weight: 400;
            line-height: 1.4;
        }
        
        .font-serif-luxury {
            font-family: 'Playfair Display', serif;
        }
        
        .font-modern {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        /* Subtle texture patterns */
        .subtle-texture {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.01) 0%, transparent 50%);
        }

        .noise-texture {
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
        }

        /* Enhanced button states */
        .btn-press {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-press:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Staggered animations */
        .stagger-1 { animation-delay: 0ms; }
        .stagger-2 { animation-delay: 100ms; }
        .stagger-3 { animation-delay: 200ms; }
        .stagger-4 { animation-delay: 300ms; }
        .stagger-5 { animation-delay: 400ms; }

        /* Carousel controls */
        .carousel-container {
            position: relative;
            padding: 0 60px;
        }
        
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(212, 175, 55, 0.95);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }
        
        .carousel-btn:hover {
            background: #D4AF37;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.4);
        }
        
        .carousel-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .carousel-btn.prev {
            left: 0;
        }
        
        .carousel-btn.next {
            right: 0;
        }
        
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        
        .carousel-dot:hover {
            background: rgba(212, 175, 55, 0.6);
            border-color: rgba(212, 175, 55, 0.2);
        }
        
        .carousel-dot.active {
            background: #D4AF37;
            width: 32px;
            border-radius: 6px;
            border-color: #D4AF37;
            transform: scale(1.05);
        }
        
        .review-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
        }
        
        .review-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Visual connectors */
        .section-connector {
            position: relative;
        }
        
        .section-connector::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, #D4AF37, transparent);
        }
        
        .view-transition {
          animation: view-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes view-in {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #111;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 80%);
        }

        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        .video-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,1) 100%);
          z-index: 1;
        }

        .pulse-ring {
          position: relative;
        }
        .pulse-ring::after {
          content: "";
          position: absolute;
          inset: -4px;
          border: 1px solid rgba(212, 175, 55, 0.3);
          border-radius: 50%;
          animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
          0% { transform: scale(1); opacity: 0.6; }
          100% { transform: scale(1.4); opacity: 0; }
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .print-only { display: block !important; padding: 50px !important; }
            .print-header { border-bottom: 3px solid #D4AF37; padding-bottom: 25px; margin-bottom: 50px; }
            .print-logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; }
            .print-section { margin-bottom: 40px; }
            .print-label { font-size: 9px; text-transform: uppercase; color: #888; font-weight: 900; letter-spacing: 0.2em; }
            .print-value { font-size: 15px; margin-top: 8px; font-weight: 600; }
            .print-specs { font-size: 13px; line-height: 1.8; color: #444; }
        }
        .print-only { display: none; }
        
        /* Welcome screen animations */
        @keyframes fade-in-scale {
          from {
            opacity: 0;
            transform: scale(0.8);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }
        
        @keyframes fade-in {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
        
        .animate-fade-in-scale {
          animation: fade-in-scale 2s ease-out forwards;
        }
        
        .animate-fade-in {
          animation: fade-in 2s ease-out forwards;
        }
    </style>

}
</script>
</head>
<body>
    <div id="root"></div>

</body>
</html>
