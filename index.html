
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBox | Precision Tech Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #000000;
            --card-bg: #080808; 
            --accent-gold: #B38B21; /* Deeper, more sophisticated metallic gold */
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        .font-serif-luxury {
            font-family: 'Playfair Display', serif;
        }
        
        .view-transition {
          animation: view-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes view-in {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #111;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(205, 160, 50, 0.05) 0%, rgba(0,0,0,0) 80%);
        }

        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        .video-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,1) 100%);
          z-index: 1;
        }

        .pulse-ring {
          position: relative;
        }
        .pulse-ring::after {
          content: "";
          position: absolute;
          inset: -4px;
          border: 1px solid rgba(205, 160, 50, 0.3);
          border-radius: 50%;
          animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
          0% { transform: scale(1); opacity: 0.6; }
          100% { transform: scale(1.4); opacity: 0; }
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .print-only { display: block !important; padding: 50px !important; }
            .print-header { border-bottom: 3px solid #B38B21; padding-bottom: 25px; margin-bottom: 50px; }
            .print-logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; }
            .print-section { margin-bottom: 40px; }
            .print-label { font-size: 9px; text-transform: uppercase; color: #888; font-weight: 900; letter-spacing: 0.2em; }
            .print-value { font-size: 15px; margin-top: 8px; font-weight: 600; }
            .print-specs { font-size: 13px; line-height: 1.8; color: #444; }
        }
        .print-only { display: none; }
    </style>
